<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POC Quirón - Acceso y Citas</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
        --primary: #0a66c2;
        --primary-hover: #084f98;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      }

      .poc-container {
        min-height: 100vh;
      }

      .login-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: 100%;
        max-width: 460px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 40px 32px;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .login-card h1 {
        margin: 0 0 24px;
        font-size: 1.8rem;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
      }

      .btn-primary {
        width: 100%;
        color: #fff;
        background: var(--primary);
      }

      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .app-screen {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      .top-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 18px;
        margin-bottom: 20px;
      }

      .top-bar .home {
        font-weight: 700;
      }

      .top-bar .welcome {
        color: var(--muted);
      }

      .btn-danger {
        color: #fff;
        background: var(--danger);
      }

      .btn-danger:hover {
        background: var(--danger-hover);
      }

      .main-content {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 20px;
      }

      .main-content h2 {
        margin: 0 0 16px;
      }

      .loading {
        margin: 8px 0 0;
        color: var(--muted);
      }

      .status {
        margin: 10px 0 0;
        font-size: 0.92rem;
      }

      .status.error {
        color: #b91c1c;
      }

      .status.info {
        color: var(--muted);
      }

      .table-wrapper {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: #f9fafb;
      }

      th,
      td {
        text-align: left;
        padding: 12px;
        border-bottom: 1px solid var(--line);
        font-size: 0.94rem;
      }

      th {
        white-space: nowrap;
      }

      @media (max-width: 700px) {
        .top-bar {
          flex-direction: column;
          align-items: flex-start;
        }

        .btn-danger {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="poc-container">
      <section class="login-screen" id="loginScreen">
        <div class="login-card">
          <h1>Acceso al Sistema</h1>
          <button type="button" class="btn btn-primary" id="loginButton">Iniciar Sesión con Microsoft Entra ID</button>
        </div>
      </section>

      <section class="app-screen" id="appScreen" hidden>
        <header class="top-bar">
          <div class="home">Home</div>
          <p class="welcome">Bienvenido, Usuario</p>
          <button type="button" class="btn btn-danger" id="logoutButton">Cerrar Sesión</button>
        </header>

        <main class="main-content">
          <h2>Listado de Citas Disponibles</h2>

          <p class="loading" id="loadingText" hidden>Cargando datos...</p>
          <p class="status info" id="statusText" hidden></p>

          <div class="table-wrapper" id="tableWrapper" hidden>
            <table>
              <thead>
                <tr>
                  <th>Username</th>
                  <th>Nombre y Apellidos</th>
                  <th>Correo Electrónico</th>
                  <th>Fecha y Hora de la Cita</th>
                </tr>
              </thead>
              <tbody id="citasBody"></tbody>
            </table>
          </div>
        </main>
      </section>
    </div>
    <script type="module">
      import {
        PublicClientApplication,
        InteractionRequiredAuthError,
      } from "https://cdn.jsdelivr.net/npm/@azure/msal-browser@4.11.0/+esm";

      const APP_CONFIG = {
        clientId: "dcde18b5-ab34-437e-b3b9-fa080940e4f8",
        tenantId: "6f167842-765d-4bda-a56e-9d433bc27739",
        apiScope: "api://dcde18b5-ab34-437e-b3b9-fa080940e4f8/access",
        apiBaseUrl: "http://localhost:3000",
      };

      const authority = `https://login.microsoftonline.com/${APP_CONFIG.tenantId}`;
      const msalInstance = new PublicClientApplication({
        auth: {
          clientId: APP_CONFIG.clientId,
          authority,
          redirectUri: window.location.origin,
        },
        cache: {
          cacheLocation: "sessionStorage",
        },
      });

      let isAuthenticated = false;
      let loading = false;
      let citas = [];
      let currentAccount = null;

      const loginScreen = document.getElementById("loginScreen");
      const appScreen = document.getElementById("appScreen");
      const loadingText = document.getElementById("loadingText");
      const statusText = document.getElementById("statusText");
      const tableWrapper = document.getElementById("tableWrapper");
      const citasBody = document.getElementById("citasBody");
      const loginButton = document.getElementById("loginButton");
      const logoutButton = document.getElementById("logoutButton");
      const welcomeText = document.querySelector(".welcome");

      function renderCitas() {
        if (!citas.length) {
          citasBody.innerHTML = `
            <tr>
              <td colspan="4">No hay datos para mostrar.</td>
            </tr>
          `;
          return;
        }

        citasBody.innerHTML = citas
          .map(
            (cita) => `
              <tr>
                <td>${cita.username}</td>
                <td>${cita.nombreApellidos}</td>
                <td>${cita.correoElectronico}</td>
                <td>${cita.fechaHoraCita}</td>
              </tr>
            `
          )
          .join("");
      }

      function setStatus(message = "", type = "info") {
        if (!message) {
          statusText.hidden = true;
          statusText.textContent = "";
          statusText.className = "status info";
          return;
        }
        statusText.hidden = false;
        statusText.textContent = message;
        statusText.className = `status ${type}`;
      }

      function render() {
        loginScreen.hidden = isAuthenticated;
        appScreen.hidden = !isAuthenticated;
        loadingText.hidden = !loading;
        tableWrapper.hidden = loading;
        welcomeText.textContent = currentAccount
          ? `Bienvenido, ${currentAccount.name || "Usuario"}`
          : "Bienvenido, Usuario";
      }

      async function getApiToken() {
        const request = {
          scopes: [APP_CONFIG.apiScope],
          account: currentAccount,
        };

        try {
          const response = await msalInstance.acquireTokenSilent(request);
          return response.accessToken;
        } catch (error) {
          if (error instanceof InteractionRequiredAuthError) {
            const popupResponse = await msalInstance.acquireTokenPopup(request);
            return popupResponse.accessToken;
          }
          throw error;
        }
      }

      async function fetchCitas() {
        const token = await getApiToken();
        const response = await fetch(`${APP_CONFIG.apiBaseUrl}/api/empleados`, {
          method: "GET",
          headers: {
            Authorization: `Bearer ${token}`,
            Accept: "application/json",
          },
        });

        if (!response.ok) {
          const errorBody = await response.text();
          throw new Error(
            `Error ${response.status} al consultar la API: ${errorBody || "sin detalle"}`
          );
        }

        return response.json();
      }

      async function login() {
        setStatus();
        isAuthenticated = true;
        loading = true;
        citas = [];
        render();

        try {
          const loginResponse = await msalInstance.loginPopup({
            scopes: ["openid", "profile", "email"],
          });

          currentAccount = loginResponse.account;
          const apiData = await fetchCitas();
          citas = Array.isArray(apiData) ? apiData : [];
          renderCitas();
          setStatus("Datos cargados correctamente.", "info");
        } catch (error) {
          isAuthenticated = false;
          currentAccount = null;
          citas = [];
          setStatus(error.message || "No se pudo iniciar sesión.", "error");
        } finally {
          loading = false;
          render();
        }
      }

      async function logout() {
        setStatus();
        try {
          if (currentAccount) {
            await msalInstance.logoutPopup({
              account: currentAccount,
              mainWindowRedirectUri: window.location.origin,
            });
          }
        } catch (error) {
          setStatus(error.message || "Error al cerrar sesión.", "error");
        }

        isAuthenticated = false;
        loading = false;
        citas = [];
        currentAccount = null;
        render();
      }

      loginButton.addEventListener("click", login);
      logoutButton.addEventListener("click", logout);

      await msalInstance.initialize();
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) {
        currentAccount = accounts[0];
        isAuthenticated = true;
        loading = true;
        render();
        try {
          const apiData = await fetchCitas();
          citas = Array.isArray(apiData) ? apiData : [];
          renderCitas();
          setStatus("Sesión recuperada y datos actualizados.", "info");
        } catch (error) {
          setStatus(error.message || "No se pudieron recuperar los datos.", "error");
        } finally {
          loading = false;
          render();
        }
      } else {
        render();
      }
    </script>
  </body>
</html>
